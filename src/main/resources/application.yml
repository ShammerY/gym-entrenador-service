server:
  port: 8085

spring:
  application:
    name: trainer-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/gimnasio
          jwk-set-uri: http://localhost:8180/realms/gimnasio/protocol/openid-connect/certs

  datasource:
    url: jdbc:h2:mem:trainerdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method