server:
  port: 8085

spring:
  application:
    name: trainer-service

  datasource:
    url: jdbc:h2:mem:trainerdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console